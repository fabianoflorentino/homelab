http:
  pprof:
    port: 6060
    enabled: false
  address: 0.0.0.0:3000
  session_ttl: 720h
users:
  - username: admin
    password: $2y$12$CHANGE_ME_HASH
dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  anonymous_tld: false
  protection_enabled: true
  blocking_mode: default
  blocking_ipv4: ""
  blocking_ipv6: ""
  blocked_response_ttl: 10
  parental_block_host: family-block.dns.adguard.com
  safebrowsing_block_host: standard-block.dns.adguard.com
  ratelimit: 20
  ratelimit_whitelist: []
  refuse_any: true
  upstream_dns:
    - 127.0.0.1:5335
  upstream_dns_file: ""
  bootstrap_dns:
    - 9.9.9.9
    - 149.112.112.112
    - 2620:fe::fe
    - 2620:fe::9
  all_servers: false
  fastest_addr: false
  fastest_timeout: 1s
  allowed_clients: []
  disallowed_clients: []
  blocked_hosts:
    - version.bind
    - id.server
    - hostname.bind
  trusted_proxies:
    - 127.0.0.0/8
    - ::1/128
  cache_size: 4194304
  cache_ttl_min: 0
  cache_ttl_max: 0
  cache_optimistic: true
  bogus_nxdomain: []
  aaaa_disabled: false
  enable_dnssec: true
  edns_client_subnet:
    custom_ip: ""
    enabled: false
    use_custom: false
  max_goroutines: 300
  handle_ddr: true
  ipset: []
  filtering_enabled: true
  filters:
    - enabled: true
      url: https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
      name: AdGuard DNS filter
      id: 1
    - enabled: true
      url: https://malware-filter.gitlab.io/malware-filter/urlhaus-filter-online.txt
      name: Malware Domain Blocklist
      id: 2
    - enabled: true
      url: https://raw.githubusercontent.com/hoshsadiq/adblock-nocoin-list/master/hosts.txt
      name: NoCoin Filter List
      id: 3
    - enabled: true
      url: https://phishing.army/download/phishing_filter.txt
      name: Phishing Army Blocklist
      id: 4
  whitelist_filters: []
  user_rules: []
  dhcp:
    enabled: false
    interface_name: ""
    local_domain_name: lan
    dhcpv4:
      gateway_ip: ""
      subnet_mask: ""
      range_start: ""
      range_end: ""
      lease_duration: 86400
      icmp_timeout_msec: 1000
      options: []
    dhcpv6:
      range_start: ""
      range_end: ""
      lease_duration: 86400
      ra_slaac_only: false
      ra_allow_slaac: false
  dnssec_enabled: true
  tls:
    enabled: false
    server_name: ""
    force_https: false
    port_https: 443
    port_dns_over_tls: 853
    port_dns_over_quic: 853
    certificate_chain: ""
    private_key: ""
    certificate_path: ""
    private_key_path: ""
  querylog:
    enabled: true
    file_enabled: true
    interval: 90
    size_memory: 1000
    ignored: []
  statistics:
    enabled: true
    interval: 90
    ignored: []
  metrics:
    enabled: true
    address: 0.0.0.0:9617
  dns_over_tls:
    enabled: false
    server_name: ""
    certificate_chain: ""
    private_key: ""
    certificate_path: ""
    private_key_path: ""
tls:
  enabled: false
  server_name: ""
  force_https: false
  port_https: 443
  port_dns_over_tls: 853
  port_dns_over_quic: 853
  certificate_chain: ""
  private_key: ""
  certificate_path: ""
  private_key_path: ""
filtering:
  enabled: true
  interval: 24
  modified: "2024-01-01T00:00:00.000Z"
  clients: null
log:
  file: ""
  max_backups: 0
  max_size: 100
  max_age: 3
  compress: false
  local_time: false
  verbose: false
os:
  group: ""
  user: ""
  rlimit_nofile: 0
schema_version: 18
